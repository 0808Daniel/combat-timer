<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Intervall Timer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --action-color: #da3633;
            --pause-color: #238636;
            --accent-color: #1f6feb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .alert-box {
            background-color: rgba(218, 54, 51, 0.1);
            border: 1px solid var(--action-color);
            color: #ff7b72;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .timer-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-header h1 {
            font-size: 1.5rem;
            color: #f0f6fc;
            margin-bottom: 5px;
        }

        .main-timer {
            font-size: 4rem;
            font-weight: bold;
            font-family: monospace;
            text-align: center;
            color: #f0f6fc;
            margin: 10px 0;
        }

        .phase-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            background-color: var(--border-color);
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .phase-badge.action {
            background-color: var(--action-color);
            color: #fff;
        }

        .phase-badge.pause {
            background-color: var(--pause-color);
            color: #fff;
        }

        .preview-box {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: rgba(0,0,0,0.2);
            position: relative;
        }

        .video-container {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 16/9;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #000;
            display: none;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .exercise-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f0f6fc;
            margin-bottom: 10px;
        }

        .exercise-guide {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 400px;
            line-height: 1.4;
        }

        .kegel-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--accent-color);
            margin-bottom: 15px;
            display: none;
            transition: transform 0.5s ease-in-out;
        }

        .kegel-circle.contract {
            transform: scale(1.3);
            background-color: var(--action-color);
            box-shadow: 0 0 20px var(--action-color);
        }

        .kegel-circle.relax {
            transform: scale(0.9);
            background-color: var(--border-color);
        }

        .kegel-status {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 5px;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-start {
            background-color: var(--pause-color);
            color: #fff;
        }

        .btn-start:hover { background-color: #2ea44f; }

        .btn-start.running {
            background-color: #b62224;
        }

        .btn-reset {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
        }

        .btn-reset:hover { background-color: #30363d; }

        .routine-panel h2 {
            font-size: 1.2rem;
            color: #f0f6fc;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .exercise-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .exercise-item .num {
            font-weight: bold;
            color: var(--accent-color);
            width: 25px;
        }

        .exercise-item .tag {
            margin-left: auto;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tag-pwr { background-color: rgba(218,54,51,0.15); color: #ff7b72; }
        .tag-core { background-color: rgba(31,111,235,0.15); color: #58a6ff; }

        .next-up-bar {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Linker Bereich: Timer & Aktuelle Übung -->
        <div class="panel">
            <div id="reminder-alert" class="alert-box">
                ⚠️ Letztes Training ist über 48h her! Zeit, die Komfortzone zu verlassen!
            </div>

            <div class="timer-header">
                <h1 id="round-title">Bereitmachen</h1>
                <div class="main-timer" id="main-timer">15:00</div>
                <center><div id="phase-badge" class="phase-badge">Drücke Start</div></center>
            </div>

            <div class="preview-box" id="preview-box">
                <div class="video-container" id="video-wrapper">
                    <video id="exercise-video" loop muted playsinline></video>
                </div>
                
                <div id="kegel-ball" class="kegel-circle"></div>
                <div id="kegel-status" class="kegel-status">ANSPANNEN</div>

                <div class="exercise-name" id="exercise-name">Lade Workout...</div>
                <div class="exercise-guide" id="exercise-guide">Gleich geht es los.</div>
                
                <div class="next-up-bar" id="next-up-text">Nächste Übung: Steht bereit</div>
            </div>

            <div class="controls">
                <button class="btn btn-start" id="btn-start">Start</button>
                <button class="btn btn-reset" id="btn-reset">Reset / Neu</button>
            </div>
        </div>

        <!-- Rechter Bereich: Heutiger Trainingsplan -->
        <div class="panel routine-panel">
            <h2>📋 Heutiger Kampfplan</h2>
            <div class="exercise-list" id="routine-list">
                <!-- Wird dynamisch befüllt -->
            </div>
        </div>

    </div>

    <script>
        const EXERCISE_DATABASE = {
            cardio: [
                { name: "Liegestütz mit Sprung", guide: "Aus der Plank in den Liegestütz absenken, beim Hochdrücken explosiv mit den Füßen nach außen springen.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/liegestutz_sprung.mp4" },
                { name: "Superman-Liegestütz", guide: "Während du die Brust senkst, ziehst du abwechselnd das Knie explosiv seitlich zum Ellenbogen.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/superman_liegestutz.mp4" }
            ],
            push: [
                { name: "Liegestütze (auf Knien)", guide: "Hände unter den Schultern, Hüfte gestreckt. Brust kontrolliert zur Matte absenken und kraftvoll hochdrücken.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/liegestutz_knie.mp4" },
                { name: "Knöchel-Liegestütz", guide: "Ausführung stabil auf den Fäusten auf der Matte. Stärkt Handgelenke und Fäuste.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/knochel_liegestutz.mp4" }
            ],
            legs: [
                { name: "Tiefe Kniebeuge (Squat)", guide: "Füße schulterbreit. Hüfte tief unter Kniehöhe absenken, Fersen bleiben fest auf der Matte.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/tiefe_kniebeuge.mp4" },
                { name: "Ausfallschritte wechselnd", guide: "Großer Schritt nach vorn, hinteres Knie senkt sich kontrolliert bis kurz vor die Matte ab.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/ausfallschritte.mp4" }
            ],
            core_power: [
                { name: "Umgekehrter Handgelenk-Liegestütz", guide: "Unterer Liegestütz auf Knien oder Zehen, Finger zeigen nach hinten zu den Knien.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/umgekehrter_handgelenk_liegestutz.mp4" },
                { name: "Schwimmer (Rückenstrecker)", guide: "Bauchlage auf der Matte. Arme und Beine anheben und paddelnde Bewegungen ausführen.", video: "https://raw.githubusercontent.com/0808Daniel/combat-timer/main/schwimmer.mp4" }
            ],
            kegel: [
                { name: "Beckenboden-Vakuum (Vierfüßler)", guide: "Im Vierfüßlerstand komplett ausatmen, Bauch tief einziehen und den Beckenboden maximal nach innen-oben saugen.", video: null },
                { name: "Glute Bridges mit Kegel-Hold", guide: "Becken hochdrücken, Gesäß fest anspannen. Oben angekommen den Beckenboden maximal kontrahieren.", video: null },
                { name: "Tactical Kegel-Intervalle", guide: "Flach auf dem Rücken. Präzise Ansteuerung: Beckenboden wie einen Fahrstuhl über 5 Sekunden nach oben ziehen.", video: null },
                { name: "Dead Bug (Beckenboden aktiv)", guide: "Rücken flach in den Boden pressen. Diagonale Extremitäten strecken, während der Beckenboden auf Spannung bleibt.", video: null }
            ]
        };

        let currentRoutine = [];
        let workoutInterval = null;
        let isRunning = false;
        
        let totalSeconds = 15 * 60; 
        let currentExerciseIndex = 0;
        let phaseSeconds = 45;
        let isActionPhase = true;

        let audioCtx = null;

        function beep(freq = 440, duration = 0.1) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function checkLastTraining() {
            const lastTraining = localStorage.getItem('lastCombatWorkout');
            const alertBox = document.getElementById('reminder-alert');
            if (lastTraining) {
                const diffTime = Math.abs(new Date() - new Date(lastTraining));
                const diffHours = Math.ceil(diffTime / (1000 * 60 * 60));
                if (diffHours >= 48) alertBox.style.display = 'block';
            } else {
                alertBox.style.display = 'block';
            }
        }

        function generateWorkout() {
            currentRoutine = [];
            
            // Wähle aus jeder Kategorie zufällig eine Übung für das heutige Workout
            let chosenExercises = {};
            ['cardio', 'push', 'legs', 'core_power'].forEach(cat => {
                const pool = EXERCISE_DATABASE[cat];
                chosenExercises[cat] = pool[Math.floor(Math.random() * pool.length)];
            });

            // Generiere 3 Runden. Jede Runde wird individuell gemischt,
            // um doppelte Übungen an den Runden-Übergängen auszuschließen.
            let lastRoundsLastExercise = null;

            for(let r = 1; r <= 3; r++) {
                let roundCategories = ['cardio', 'push', 'legs', 'core_power'];
                let validMix = false;

                // Solange mischen, bis die erste Übung der neuen Runde ungleich der letzten der alten Runde ist
                while (!validMix) {
                    roundCategories.sort(() => Math.random() - 0.5);
                    if (r === 1 || chosenExercises[roundCategories[0]].name !== lastRoundsLastExercise) {
                        validMix = true;
                    }
                }

                // Abspeichern für den nächsten Runden-Check
                lastRoundsLastExercise = chosenExercises[roundCategories[roundCategories.length - 1]].name;

                // Runde befüllen
                roundCategories.forEach(cat => {
                    const ex = chosenExercises[cat];
                    currentRoutine.push({ name: ex.name, guide: ex.guide, type: 'Power', round: r, videoUrl: ex.video });
                });
            }

            // Finisher (Kegel) anhängen
            let shuffledKegels = [...EXERCISE_DATABASE.kegel].sort(() => Math.random() - 0.5);
            for(let i = 0; i < 3; i++) {
                let kegelEx = shuffledKegels[i % shuffledKegels.length];
                currentRoutine.push({ name: kegelEx.name, guide: kegelEx.guide, type: 'Core', round: 'Finisher', videoUrl: null });
            }

            renderRoutineList();
            updateUI();
        }

        function renderRoutineList() {
            const listContainer = document.getElementById('routine-list');
            listContainer.innerHTML = '';
            
            let displayItems = [];
            let seen = new Set();
            currentRoutine.forEach(item => {
                if(item.type === 'Power' && !seen.has(item.name)) {
                    seen.add(item.name);
                    displayItems.push(item);
                }
            });
            let kegelCount = 0;
            currentRoutine.forEach(item => {
                if(item.type === 'Core' && kegelCount < 2) {
                    displayItems.push(item);
                    kegelCount++;
                }
            });

            displayItems.forEach((ex, index) => {
                const item = document.createElement('div');
                item.className = 'exercise-item';
                item.innerHTML = `
                    <span class="num">${index + 1}</span>
                    <span>${ex.name}</span>
                    <span class="tag ${ex.type === 'Power' ? 'tag-pwr' : 'tag-core'}">${ex.type === 'Power' ? 'Power' : 'Kegel'}</span>
                `;
                listContainer.appendChild(item);
            });
        }

        function updateUI() {
            if (currentExerciseIndex >= currentRoutine.length) return;
            const current = currentRoutine[currentExerciseIndex];
            
            let totalMin = Math.floor(totalSeconds / 60);
            let totalSec = totalSeconds % 60;
            document.getElementById('main-timer').innerText = 
                `${totalMin.toString().padStart(2, '0')}:${totalSec.toString().padStart(2, '0')}`;

            const roundTitleEl = document.getElementById('round-title');
            if (!isRunning && totalSeconds === 15 * 60) {
                roundTitleEl.innerText = "Bereitmachen";
            } else if (current.round === 'Finisher') {
                roundTitleEl.innerText = `🔒 Standhaftigkeits-Finisher`;
            } else {
                roundTitleEl.innerText = `Runde ${current.round || 1} von 3`;
            }

            const badge = document.getElementById('phase-badge');
            if (!isRunning && totalSeconds === 15 * 60) {
                badge.innerText = "Drücke Start für die Session";
                badge.className = "phase-badge";
            } else if (current.round === 'Finisher') {
                badge.innerText = `FINISHER WORK: ${phaseSeconds}s`;
                badge.className = "phase-badge action";
                document.getElementById('preview-box').style.borderColor = "var(--accent-color)";
            } else {
                if(isActionPhase) {
                    badge.innerText = `ACTION: ${phaseSeconds}s`;
                    badge.className = "phase-badge action";
                    document.getElementById('preview-box').style.borderColor = "var(--action-color)";
                } else {
                    badge.innerText = `PAUSE: ${phaseSeconds}s`;
                    badge.className = "phase-badge pause";
                    document.getElementById('preview-box').style.borderColor = "var(--border-color)";
                }
            }

            // Korrigierte Vorankündigungs-Logik für den Text ganz unten
            let nextEx = null;
            if (current.round === 'Finisher') {
                nextEx = currentRoutine[currentExerciseIndex + 1];
            } else {
                nextEx = isActionPhase ? currentRoutine[currentExerciseIndex + 1] : currentRoutine[currentExerciseIndex];
            }
            document.getElementById('next-up-text').innerText = nextEx ? `Nächste Übung: ${nextEx.name}` : "Endspurt!";

            const videoWrapper = document.getElementById('video-wrapper');
            const videoEl = document.getElementById('exercise-video');
            const nameEl = document.getElementById('exercise-name');
            const guideEl = document.getElementById('exercise-guide');
            const kegelBall = document.getElementById('kegel-ball');
            const kegelStatus = document.getElementById('kegel-status');

            if (current.type === 'Core') {
                videoWrapper.style.display = 'none';
                videoEl.pause();
                nameEl.innerText = current.name;
                guideEl.innerText = current.guide;
                kegelBall.style.display = 'block';
                kegelStatus.style.display = 'block';
                
                if (phaseSeconds % 10 >= 5) {
                    kegelBall.className = "kegel-circle contract";
                    kegelStatus.innerText = "🔥 5s ANSPANNEN!";
                    kegelStatus.style.color = "var(--action-color)";
                } else {
                    kegelBall.className = "kegel-circle relax";
                    kegelStatus.innerText = "🌬️ 5s ENTSPANNEN";
                    kegelStatus.style.color = "var(--text-muted)";
                }
            } else {
                kegelBall.style.display = 'none';
                kegelStatus.style.display = 'none';
                
                if (isActionPhase && current.videoUrl) {
                    videoWrapper.style.display = 'block';
                    if (videoEl.src !== current.videoUrl) {
                        videoEl.src = current.videoUrl;
                        videoEl.load();
                    }
                    if (isRunning) {
                        videoEl.play().catch(e => console.log("Autoplay blockiert:", e));
                    }
                    nameEl.innerText = current.name;
                    guideEl.innerText = current.guide;
                } else {
                    videoWrapper.style.display = 'none';
                    videoEl.pause();
                    if (!isActionPhase) {
                        nameEl.innerText = `Gleich: ${current.name}`;
                        guideEl.innerText = current.guide;
                    } else {
                        nameEl.innerText = current.name;
                        guideEl.innerText = current.guide;
                    }
                }
            }
        }

        function tick() {
            if (totalSeconds <= 0) {
                clearInterval(workoutInterval);
                beep(880, 0.8);
                document.getElementById('phase-badge').innerText = "SESSION BESTANDEN!";
                localStorage.setItem('lastCombatWorkout', new Date().toISOString());
                document.getElementById('reminder-alert').style.display = 'none';
                return;
            }

            totalSeconds--;
            phaseSeconds--;

            if (phaseSeconds <= 3 && phaseSeconds > 0) {
                beep(440, 0.08);
            }

            if (phaseSeconds <= 0) {
                beep(660, 0.3);
                const current = currentRoutine[currentExerciseIndex];
                
                if (current.round === 'Finisher') {
                    currentExerciseIndex++;
                    phaseSeconds = 60;
                } else {
                    if (isActionPhase) {
                        isActionPhase = false;
                        phaseSeconds = 15; 
                        currentExerciseIndex++; 
                    } else {
                        isActionPhase = true;
                        phaseSeconds = 45; 
                    }
                }
            }

            updateUI();
        }

        document.getElementById('btn-start').addEventListener('click', function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const videoEl = document.getElementById('exercise-video');
            if (!isRunning) {
                isRunning = true;
                this.innerText = "Pause";
                this.className = "btn btn-start running";
                if(audioCtx.state === 'suspended') audioCtx.resume();
                workoutInterval = setInterval(tick, 1000);
                if (document.getElementById('video-wrapper').style.display === 'block') {
                    videoEl.play().catch(e => console.log(e));
                }
                updateUI();
            } else {
                isRunning = false;
                this.innerText = "Start";
                this.className = "btn btn-start";
                clearInterval(workoutInterval);
                videoEl.pause();
            }
        });

        document.getElementById('btn-reset').addEventListener('click', function() {
            clearInterval(workoutInterval);
            isRunning = false;
            const startBtn = document.getElementById('btn-start');
            startBtn.innerText = "Start";
            startBtn.className = "btn btn-start";
            
            totalSeconds = 15 * 60;
            currentExerciseIndex = 0;
            phaseSeconds = 45;
            isActionPhase = true;
            
            generateWorkout();
        });

        checkLastTraining();
        generateWorkout();
    </script>
</body>
</html>
